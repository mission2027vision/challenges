<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-width=1.0">
    <title>WWF Rangers 기획안 포트폴리오</title>
    <style>
        body { font-family: 'Pretendard', sans-serif; background-color: #f4f6f8; color: #333; display: flex; flex-direction: column; align-items: center; padding: 50px 20px; margin: 0; }
        .header { text-align: center; margin-bottom: 40px; }
        .header h1 { color: #0b1d2e; font-size: 32px; margin-bottom: 10px; }
        .header p { color: #555; font-size: 16px; }
        .menu-container { display: flex; flex-direction: column; gap: 20px; width: 100%; max-width: 600px; }
        
        /* 버튼(카드) 디자인 */
        .menu-card { background: white; padding: 25px; border-radius: 12px; box-shadow: 0 4px 15px rgba(0,0,0,0.1); text-decoration: none; color: inherit; transition: transform 0.2s, box-shadow 0.2s; border-left: 6px solid #1a8b9d; }
        .menu-card:hover { transform: translateY(-5px); box-shadow: 0 8px 25px rgba(0,0,0,0.15); }
        .menu-card.green { border-color: #27ae60; }
        
        .menu-card h2 { margin: 0 0 10px 0; font-size: 22px; color: #1a8b9d; }
        .menu-card.green h2 { color: #27ae60; }
        .menu-card p { margin: 0; color: #666; line-height: 1.5; font-size: 15px; }
    </style>
</head>
<body>
    <div class="header">
        <h1>WWF Rangers 기획안 🐢</h1>
        <p>원하는 기획안 버전을 클릭하여 확인해 보세요.</p>
    </div>

    <div class="menu-container">
        <!-- 1번 방 연결: href 부분에 이동할 파일명을 적어줍니다 -->
        <a href="preview.html" class="menu-card">
            <h2>🗺️ 1번 방: ShellBank 부르마블 게임 </h2>
            <p>주사위를 굴려 세계를 이동하고 퀴즈를 풀며 해양보호구역을 선점하는 인터랙티브 보드게임 기획안입니다.</p>
        </a>

        <!-- 2번 방 연결 -->
        <a href="mission2.html" class="menu-card green">
            <h2>📖 2번 방: 아기 거북이 구조대 </h2>
            <p>쉘뱅크의 데이터를 시각화하고 귀여운 거북이 캐릭터와 대화하며 정보를 탐색하는 기획안입니다.</p>
        </a>
    </div>
</body>
</html>
